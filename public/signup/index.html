<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaL 서비스 통합 회원가입 | PaLMath</title>
    <meta name="description" content="PaL 서비스 통합 회원가입 페이지입니다. PaLMath에서 차원이 다른 수학 학습을 경험하세요.">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="floating-particle particle-1"></div>
    <div class="floating-particle particle-2"></div>

    <main class="glass-container">
        <h1 class="brand-title">PaL <span class="brand-accent">Service</span></h1>
        <p class="brand-subtitle">통합 회원가입으로 PaLMath를 시작하세요.</p>

        <div id="alertBox" class="alert"></div>

        <form id="signupForm" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" class="glow-input" placeholder="사용할 아이디를 입력하세요" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" class="glow-input" placeholder="비밀번호를 입력하세요" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="name" class="form-label">이름</label>
                <input type="text" id="name" class="glow-input" placeholder="본인의 이름을 입력하세요" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">이메일</label>
                <input type="email" id="email" class="glow-input" placeholder="이메일 주소를 입력하세요" required autocomplete="email">
            </div>

            <button type="submit" class="btn-primary" id="btnSignup">
                회원가입 완료
            </button>
        </form>

        <div class="form-footer">
            이미 계정이 있으신가요? 
            <a href="/login" class="form-footer-link">로그인하기</a>
        </div>
    </main>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const alertBox = document.getElementById('alertBox');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            
            // Clean up alert class
            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            // Local validation
            if (!username || !password || !name || !email) {
                alertBox.textContent = '모든 필드를 올바르게 입력해주세요.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            if (password.length < 4) {
                alertBox.textContent = '비밀번호는 최소 4글자 이상이어야 합니다.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            // Disable button during loading
            const btnSignup = document.getElementById('btnSignup');
            btnSignup.disabled = true;
            btnSignup.textContent = '처리 중...';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password, name, email })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alertBox.textContent = result.message;
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    
                    // Clear inputs
                    usernameInput.value = '';
                    passwordInput.value = '';
                    nameInput.value = '';
                    emailInput.value = '';
                    
                    // Redirect to login page after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    alertBox.textContent = result.message || '회원가입에 실패했습니다. 다시 시도해주세요.';
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                    btnSignup.disabled = false;
                    btnSignup.textContent = '회원가입 완료';
                }
            } catch (err) {
                alertBox.textContent = '네트워크 오류가 발생했습니다. 서버 연결을 확인하세요.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                btnSignup.disabled = false;
                btnSignup.textContent = '회원가입 완료';
            }
        });
    </script>
</body>
</html>
