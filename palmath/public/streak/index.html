<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 스트리크 | PaLMath</title>
    <meta name="description" content="나의 학습 연속 일수(스트리크)와 Lago 캐릭터 포즈, 학습 달력을 확인하는 대시보드입니다.">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            background: #fafafc;
            color: #1a1523;
            font-family: var(--font-outfit), sans-serif;
            padding-top: 1.5rem;
            min-height: 100vh;
        }

        /* Top control bar */
        .control-bar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #ffffff;
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 16px;
            margin: 0 auto 2rem auto;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .control-logo-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-text) 40%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .control-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn-control {
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid var(--border-glow);
            color: var(--color-text);
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-outfit);
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .btn-control:hover {
            border-color: var(--border-glow-active);
            background: var(--primary-grad);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(138, 75, 235, 0.3);
        }

        .streak-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2.5rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        @media (max-width: 900px) {
            .streak-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        /* Left Side: Stats & Lago mascot */
        .mascot-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(138, 75, 235, 0.06);
            border: 1px solid rgba(138, 75, 235, 0.1);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .mascot-image-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mascot-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .mascot-img:hover {
            transform: scale(1.05);
        }

        .lago-bubble {
            background: #ffffff;
            color: #5b21b6;
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-size: 0.88rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            position: relative;
            max-width: 260px;
            box-shadow: 0 4px 12px rgba(138, 75, 235, 0.05);
        }

        .lago-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
        }

        .stats-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            background: #f8f7fc;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(138, 75, 235, 0.05);
        }

        .stat-val {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary-grad);
            margin-bottom: 0.2rem;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            font-weight: 600;
        }

        .stat-item.full-width {
            grid-column: span 2;
        }

        .btn-streak-action {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 12px;
            transition: var(--transition-smooth);
            cursor: pointer;
            text-align: center;
            display: block;
        }

        /* Right Side: Calendar container */
        .calendar-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(138, 75, 235, 0.06);
            border: 1px solid rgba(138, 75, 235, 0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #f0f0f5;
            padding-bottom: 1rem;
        }

        .calendar-nav-btn {
            background: #f1f0f7;
            border: none;
            color: #1a1523;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
        }

        .calendar-nav-btn:hover {
            background: #e2dff0;
            color: hsl(265, 80%, 50%);
        }

        .calendar-month-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a1523;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.8rem;
            text-align: center;
        }

        .weekday-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-text-muted);
            padding: 0.5rem 0;
        }

        .weekday-label:nth-child(7n+1) {
            color: #ef4444; /* Sunday Red */
        }

        .weekday-label:nth-child(7n) {
            color: #3b82f6; /* Saturday Blue */
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 0.95rem;
            font-weight: 600;
            color: #4a5568;
            position: relative;
            cursor: default;
            transition: all 0.2s ease;
        }

        .calendar-day.prev-next-month {
            color: #cbd5e1;
            opacity: 0.5;
        }

        /* Active Completed Study Day Highlight styling */
        .calendar-day.completed-day {
            background: rgba(138, 75, 235, 0.08);
            border: 2px solid var(--border-glow-active);
            color: hsl(265, 85%, 45%);
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(138, 75, 235, 0.08);
        }

        /* Highlight actual current day */
        .calendar-day.today-day::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #ef4444;
        }

        .calendar-legend {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-weight: 600;
            border-top: 1px solid #f0f0f5;
            padding-top: 1rem;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- Header Control Bar -->
    <div class="control-bar no-print">
        <div class="control-logo-group">
            <span class="control-logo" onclick="window.location.href='/home'">PaLMath Streak</span>
        </div>
        <div class="control-actions">
            <button class="btn-control" onclick="window.location.href='/home'">대시보드로 돌아가기</button>
        </div>
    </div>

    <div class="streak-layout">
        <!-- Left Side: Mascot & Statistics Summary -->
        <div class="mascot-card">
            <div class="lago-bubble" id="lagoSpeechBubble">학습 현황 데이터를 로드하는 중이야!</div>
            
            <div class="mascot-image-wrapper">
                <img src="/images/rago_studying.png" class="mascot-img" id="lagoMascotImage" alt="LAGO">
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val" id="currentStreakVal">0</span>
                    <span class="stat-lbl">현재 연속 스트리크</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="maxStreakVal">0</span>
                    <span class="stat-lbl">역대 최고 스트리크</span>
                </div>
                <div class="stat-item full-width">
                    <span class="stat-val" id="totalActiveDaysVal">0</span>
                    <span class="stat-lbl">총 완료 학습일수</span>
                </div>
            </div>

            <button class="btn-streak-action btn-primary" onclick="window.location.href='/study'">오늘의 학습 시작하기</button>
            <button class="btn-streak-action btn-control" onclick="window.location.href='/home'" style="border: 1px solid #ddd; background: #fff; color: #555;">실력 진단 평가 치르기</button>
        </div>

        <!-- Right Side: Month Calendar Grid View -->
        <div class="calendar-card">
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="changeMonth(-1)">◀</button>
                <div class="calendar-month-title" id="calendarMonthTitle">2026년 7월</div>
                <button class="calendar-nav-btn" onclick="changeMonth(1)">▶</button>
            </div>

            <div class="calendar-grid" id="calendarGrid">
                <!-- Days will render here dynamically in JavaScript -->
            </div>

            <div class="calendar-legend">
                <div class="legend-item">
                    <div class="legend-dot" style="border: 2px solid var(--border-glow-active); background: rgba(138, 75, 235, 0.08);"></div>
                    <span>학습 완료일</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #f8f7fc; border: 1px solid #e2e8f0;"></div>
                    <span>학습 미완료일</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ef4444; width: 6px; height: 6px;"></div>
                    <span>오늘 (오늘 표시 점)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Network connection checker self-contained -->
    <div id="networkOfflineOverlay" class="network-overlay">
        <div class="network-card">
            <span class="network-icon">⚠️</span>
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.8rem; color:#fff;">네트워크 연결 필요</h2>
            <p style="font-size: 0.9rem; color: var(--color-text-muted); line-height: 1.5; margin-bottom: 1.5rem;">
                안정적인 학습 데이터 동기화를 위해 인터넷 연결을 확인해 주십시오.
            </p>
            <button class="btn-primary" style="margin-top:0;" onclick="window.location.reload()">다시 시도</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://pal-inte-db-default-rtdb.asia-southeast1.firebasedatabase.app";
        const sessionUser = JSON.parse(localStorage.getItem('palUser'));
        
        if (!sessionUser) {
            alert("로그인이 만료되었습니다. 다시 로그인 해 주세요.");
            window.location.href = '/login';
        }

        const username = sessionUser.username;

        // Check network connection
        function checkNetworkConnection() {
            let overlay = document.getElementById('networkOfflineOverlay');
            if (navigator.onLine) {
                overlay.classList.remove('active');
            } else {
                overlay.classList.add('active');
            }
        }
        window.addEventListener('online', checkNetworkConnection);
        window.addEventListener('offline', checkNetworkConnection);
        checkNetworkConnection();

        // Calendar Date states
        let currentDate = new Date();
        let activeDates = {};

        // Fetch User Streak Data from Firebase
        async function fetchStreakData() {
            try {
                const url = `${FIREBASE_URL}/users/${username}/streak.json`;
                const res = await fetch(url);
                const streakData = await res.json();
                
                if (streakData) {
                    const count = streakData.currentStreak || 0;
                    const maxStreak = streakData.maxStreak || count;
                    
                    // Parse active history dates
                    activeDates = {};
                    if (streakData.history) {
                        if (Array.isArray(streakData.history)) {
                            // If stored as array
                            streakData.history.forEach(d => {
                                if (d) activeDates[d] = true;
                            });
                        } else if (typeof streakData.history === 'object') {
                            // If stored as object
                            activeDates = streakData.history;
                        }
                    }

                    // Render Stats
                    document.getElementById('currentStreakVal').textContent = count;
                    document.getElementById('maxStreakVal').textContent = maxStreak;
                    document.getElementById('totalActiveDaysVal').textContent = Object.keys(activeDates).filter(k => activeDates[k]).length;

                    // Update Lago seal poses and comments
                    updateLagoWidget(count);
                } else {
                    updateLagoWidget(0);
                }
            } catch(e) {
                console.error("Firebase fetch error:", e);
                updateLagoWidget(0);
            }

            renderCalendarGrid();
        }

        // Lago Widget updates
        function updateLagoWidget(streakCount) {
            const img = document.getElementById('lagoMascotImage');
            const bubble = document.getElementById('lagoSpeechBubble');
            
            // Check sleep time (22:00 to 06:00)
            const hours = new Date().getHours();
            if (hours >= 22 || hours < 6) {
                img.src = "/images/rago_sleeping.png";
                bubble.textContent = "라곤 이제 많이 졸려... 너도 일찍 자고 맑은 정신으로 내일 같이 공부하자! 💤";
                return;
            }

            // Check if studied today
            const todayStr = new Date().toLocaleDateString('en-CA');
            const studiedToday = activeDates[todayStr] === true;

            if (studiedToday) {
                // If they already studied today
                const displayStreak = Math.max(1, streakCount);
                if (displayStreak >= 5) {
                    img.src = "/images/rago_thumbsup.png";
                    bubble.textContent = `대단해! 오늘 공부도 완료해서 ${displayStreak}일 연속 달성 중이야! 라고의 특급 칭찬! 👍`;
                } else {
                    img.src = "/images/rago_happy.png";
                    bubble.textContent = `오늘 공부 완료! 연속 ${displayStreak}일째 불꽃을 이어가고 있어. 라고가 무척 기뻐! 😊`;
                }
            } else {
                // If they haven't studied today yet
                if (streakCount === 0) {
                    img.src = "/images/rago_angry.png";
                    bubble.textContent = "오늘 공부 아직 안 시작한 거야? 라고 섭섭하려 해... 어서 오늘의 학습을 시작하자! 😡";
                } else {
                    img.src = "/images/rago_studying.png";
                    bubble.textContent = `오늘 공부를 완료하면 연속 ${streakCount}일째 불꽃을 이을 수 있어! 라고랑 같이 책 피고 시작할까? ✏️`;
                }
            }
        }

        // Calendar rendering mechanics
        function renderCalendarGrid() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Set Month Title Header
            const korMonths = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            document.getElementById('calendarMonthTitle').textContent = `${year}년 ${korMonths[month]}`;

            // Render Weekday Labels (일, 월, 화, 수, 목, 금, 토)
            const labels = ['일', '월', '화', '수', '목', '금', '토'];
            labels.forEach(lbl => {
                const item = document.createElement('div');
                item.className = 'weekday-label';
                item.textContent = lbl;
                grid.appendChild(item);
            });

            // Find start weekday and total days in current month
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            // Find days in previous month
            const prevTotalDays = new Date(year, month, 0).getDate();

            // Render padding days from previous month
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                const dayVal = prevTotalDays - i;
                const cell = document.createElement('div');
                cell.className = 'calendar-day prev-next-month';
                cell.textContent = dayVal;
                grid.appendChild(cell);
            }

            // Render days of the current month
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                cell.textContent = day;

                // Check active date key format (YYYY-MM-DD)
                const formattedDate = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                
                // Highlight completed day
                if (activeDates[formattedDate]) {
                    cell.classList.add('completed-day');
                    cell.innerHTML = `${day}<span style="font-size:0.5rem; position:absolute; top:-2px; right:-2px;">🟣</span>`;
                }

                // Check if today
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    cell.classList.add('today-day');
                }

                grid.appendChild(cell);
            }

            // Render padding days of the next month to fill grid
            const totalRenderedCells = firstDayIndex + totalDays;
            const remainingPadding = (7 - (totalRenderedCells % 7)) % 7;
            for (let day = 1; day <= remainingPadding; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day prev-next-month';
                cell.textContent = day;
                grid.appendChild(cell);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendarGrid();
        }

        // Initialize on load
        fetchStreakData();
    </script>
</body>
</html>
