<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 원격 OMR 답안지 | PaLMath</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            background: #fafafc;
            color: #1a1523;
            font-family: var(--font-outfit), sans-serif;
            padding: 1.5rem 1rem;
            min-height: 100vh;
        }

        .omr-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(138, 75, 235, 0.08);
            padding: 1.5rem;
            max-width: 500px;
            margin: 0 auto;
            border: 1px solid rgba(138, 75, 235, 0.1);
        }

        .omr-header {
            text-align: center;
            border-bottom: 2px dashed rgba(138, 75, 235, 0.15);
            padding-bottom: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .omr-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-grad);
            margin-bottom: 0.3rem;
            letter-spacing: -0.5px;
        }

        .omr-subtitle {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            font-weight: 600;
        }

        .test-code-badge {
            background: rgba(138, 75, 235, 0.08);
            color: hsl(265, 80%, 50%);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-family: monospace;
            font-weight: 800;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 0.6rem;
            border: 1px solid rgba(138, 75, 235, 0.15);
        }

        .omr-question-item {
            border-bottom: 1px solid #f0f0f5;
            padding: 1.2rem 0;
        }

        .omr-question-item:last-child {
            border-bottom: none;
        }

        .question-label {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .q-badge {
            background: var(--primary-grad);
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 800;
        }

        /* Bubble Sheet radios styling */
        .bubble-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .bubble-label {
            flex: 1;
            min-width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            font-size: 0.95rem;
            font-weight: 700;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .bubble-label input {
            display: none;
        }

        .bubble-label:hover {
            border-color: var(--border-glow);
            background: rgba(138, 75, 235, 0.05);
        }

        .bubble-label.active {
            background: var(--primary-grad);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 10px rgba(138, 75, 235, 0.3);
            transform: scale(1.05);
        }

        /* Subjective Answer input */
        .omr-text-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            outline: none;
            background: #f8fafc;
        }

        .omr-text-input:focus {
            border-color: var(--border-glow-active);
            background: #fff;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.15);
        }

        .omr-fraction-container {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.4rem;
        }

        .omr-fraction-input {
            width: 80px;
            padding: 0.6rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            outline: none;
            background: #f8fafc;
        }

        .omr-fraction-input:focus {
            border-color: var(--border-glow-active);
            background: #fff;
        }

        .btn-submit-omr {
            background: var(--primary-grad);
            color: #fff;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(138, 75, 235, 0.25);
            transition: all 0.2s ease;
        }

        .btn-submit-omr:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        /* Success screen styling */
        .success-screen {
            text-align: center;
            display: none;
            padding: 2rem 1rem;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1.2rem;
            display: block;
        }

        .success-desc {
            font-size: 0.95rem;
            color: var(--color-text-muted);
            line-height: 1.6;
            margin: 1rem 0 2rem;
        }
    </style>
</head>
<body>

    <div class="omr-card" id="omrCard">
        <div id="omrInputArea">
            <div class="omr-header">
                <div class="omr-title">PaLMath OMR SHEET</div>
                <div class="omr-subtitle" id="chapterTitle">평가 시험 답안지 입력</div>
                <div class="test-code-badge" id="testCodeBadge">CODE: 대기중...</div>
            </div>

            <form id="omrForm">
                <div id="omrQuestionsList">
                    <!-- Dynamic rendering of OMR bubbles -->
                </div>

                <button type="submit" class="btn-submit-omr">OMR 답안지 전송</button>
            </form>
        </div>

        <div class="success-screen" id="successScreen">
            <span class="success-icon">🎉</span>
            <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--color-success);">답안 전송 완료!</h2>
            <p class="success-desc">
                작성하신 OMR 답안지가 본 화면과 성공적으로 연동되었습니다.<br>
                <strong>PC 또는 태블릿 시험 화면</strong>을 통해 실시간 채점 결과와 해설지를 확인해 주십시오.
            </p>
            <button class="btn-primary" style="margin-top: 0; width: 100%;" onclick="window.close()">창 닫기</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://pal-inte-db-default-rtdb.asia-southeast1.firebasedatabase.app";
        const urlParams = new URLSearchParams(window.location.search);
        const testCode = urlParams.get('code');

        if (!testCode) {
            alert("유효하지 않은 시험지 코드입니다. 올바른 경로를 클릭해 주십시오.");
            document.body.innerHTML = `<div style="text-align:center; padding:3rem; font-weight:bold;">⚠️ 잘못된 접근입니다.</div>`;
        } else {
            document.getElementById('testCodeBadge').textContent = `CODE: ${testCode}`;
            loadTestData();
        }

        let testQuestions = [];

        async function loadTestData() {
            try {
                const res = await fetch(`${FIREBASE_URL}/tests/${testCode}.json`);
                const data = await res.json();
                if (!data) {
                    alert("시험지 데이터를 찾을 수 없습니다.");
                    return;
                }

                document.getElementById('chapterTitle').textContent = `${data.chapter} 실력 평가 OMR`;
                testQuestions = data.questions;

                renderOMRFields();
            } catch (e) {
                console.error("Failed to load test metadata:", e);
                alert("네트워크 통신 중 오류가 발생했습니다.");
            }
        }

        function renderOMRFields() {
            const list = document.getElementById('omrQuestionsList');
            list.innerHTML = '';

            testQuestions.forEach(q => {
                const item = document.createElement('div');
                item.className = 'omr-question-item';

                let fieldsHtml = '';
                if (q.options) {
                    const isMultiSelect = q.correctAnswer && q.correctAnswer.toString().includes(',');
                    fieldsHtml = `<div class="bubble-row">`;
                    q.options.forEach((opt, idx) => {
                        const val = idx + 1;
                        if (isMultiSelect) {
                            fieldsHtml += `
                                <label class="bubble-label" id="label-q${q.id}-${val}">
                                    <input type="checkbox" name="q${q.id}" value="${val}" onchange="toggleBubble(${q.id}, ${val}, true)">
                                    ${val}
                                </label>
                            `;
                        } else {
                            fieldsHtml += `
                                <label class="bubble-label" id="label-q${q.id}-${val}">
                                    <input type="radio" name="q${q.id}" value="${val}" required onchange="toggleBubble(${q.id}, ${val}, false)">
                                    ${val}
                                </label>
                            `;
                        }
                    });
                    fieldsHtml += `</div>`;
                } else {
                    // Subjective
                    const isFraction = q.correctAnswer.toString().includes('/');
                    if (isFraction) {
                        fieldsHtml = `
                            <div class="omr-fraction-container">
                                <input type="number" class="omr-fraction-input" placeholder="분자" required id="q${q.id}_num" autocomplete="off">
                                <div style="height:2px; width:15px; background:#aaa;"></div>
                                <input type="number" class="omr-fraction-input" placeholder="분모" required id="q${q.id}_den" autocomplete="off">
                            </div>
                        `;
                    } else {
                        fieldsHtml = `
                            <input type="text" class="omr-text-input" placeholder="정답 입력" required id="q${q.id}" autocomplete="off">
                        `;
                    }
                }

                item.innerHTML = `
                    <div class="question-label">
                        <span class="q-badge">${q.id}</span>
                        <span>문제 ${q.id}번</span>
                    </div>
                    ${fieldsHtml}
                `;
                list.appendChild(item);
            });
        }

        // Toggle selected styling for bubble labels
        function toggleBubble(qId, val, isMulti = false) {
            if (isMulti) {
                const label = document.getElementById(`label-q${qId}-${val}`);
                const checkbox = label.querySelector('input');
                if (checkbox.checked) {
                    label.classList.add('active');
                } else {
                    label.classList.remove('active');
                }
            } else {
                // Find all labels for this question and deactivate them
                const container = document.getElementById(`label-q${qId}-${val}`).parentElement;
                const labels = container.querySelectorAll('.bubble-label');
                labels.forEach(label => label.classList.remove('active'));

                // Activate current label
                document.getElementById(`label-q${qId}-${val}`).classList.add('active');
            }
        }

        // Handle Form Submission
        document.getElementById('omrForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const answers = {};
            testQuestions.forEach(q => {
                if (q.options) {
                    const isMultiSelect = q.correctAnswer && q.correctAnswer.toString().includes(',');
                    if (isMultiSelect) {
                        const checked = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
                        const vals = Array.from(checked).map(c => c.value);
                        answers[q.id] = vals.sort((a, b) => parseInt(a) - parseInt(b)).join(',');
                    } else {
                        const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
                        answers[q.id] = checked ? checked.value : '';
                    }
                } else {
                    const isFraction = q.correctAnswer.toString().includes('/');
                    if (isFraction) {
                        const num = document.getElementById(`q${q.id}_num`).value;
                        const den = document.getElementById(`q${q.id}_den`).value;
                        answers[q.id] = `${num}/${den}`;
                    } else {
                        const val = document.getElementById(`q${q.id}`).value;
                        answers[q.id] = val ? val.trim() : '';
                    }
                }
            });

            // Put answers directly onto Firebase
            try {
                const url = `${FIREBASE_URL}/tests/${testCode}/submission.json`;
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answers })
                });

                // Display success
                document.getElementById('omrInputArea').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            } catch(err) {
                console.error("Error submitting OMR sheet:", err);
                alert("답안지 전송에 실패했습니다. 다시 시도해 주세요.");
            }
        });
    </script>
</body>
</html>
