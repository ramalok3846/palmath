<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaL 서비스 통합 로그인 | PaLMath</title>
    <meta name="description" content="PaL 서비스 통합 로그인 페이지입니다. PaLMath에서 개별화 맞춤형 수학 학습 여정을 즐겨보세요.">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="floating-particle particle-1"></div>
    <div class="floating-particle particle-2"></div>

    <main class="glass-container">
        <h1 class="brand-title">PaL <span class="brand-accent">Math</span></h1>
        <p class="brand-subtitle">PaL 서비스 통합 계정으로 로그인하세요.</p>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" class="glow-input" placeholder="아이디를 입력하세요" required autocomplete="username" autofocus>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" class="glow-input" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary" id="btnLogin">
                로그인
            </button>
            
            <button type="button" class="btn-secondary" onclick="window.location.href='/signup'">
                새 계정 만들기
            </button>
        </form>

    </main>

    <script>
        // Check network connection
        function checkNetworkConnection() {
            let overlay = document.getElementById('networkOfflineOverlay');
            if (!overlay) {
                const div = document.createElement('div');
                div.id = 'networkOfflineOverlay';
                div.className = 'network-overlay';
                div.innerHTML = `
                    <div class="network-card">
                        <span class="network-icon">⚠️</span>
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.8rem; color:#fff;">네트워크 연결 필요</h2>
                        <p style="font-size: 0.9rem; color: var(--color-text-muted); line-height: 1.5; margin-bottom: 1.5rem;">
                            안정적인 학습 데이터 동기화를 위해 인터넷 연결을 확인해 주십시오. 연결이 복구되면 자동으로 잠금이 해제됩니다.
                        </p>
                        <button class="btn-primary" style="margin-top:0;" onclick="window.location.reload()">다시 시도</button>
                    </div>
                `;
                document.body.appendChild(div);
                overlay = div;
            }
            
            const isOnline = navigator.onLine;
            if (!isOnline) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        window.addEventListener('online', checkNetworkConnection);
        window.addEventListener('offline', checkNetworkConnection);
        window.addEventListener('load', checkNetworkConnection);
        checkNetworkConnection();

        // Check if already logged in, but let them re-login if they want
        // Clear old sessions first
        localStorage.removeItem('palUser');

        // Focus and navigation
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Automatically focus on load (fallback)
        usernameInput.focus();

        usernameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertBox = document.getElementById('alertBox');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            alertBox.style.display = 'none';
            alertBox.className = 'alert';

            if (!username || !password) {
                alertBox.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            const btnLogin = document.getElementById('btnLogin');
            btnLogin.disabled = true;
            btnLogin.textContent = '로그인 중...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    alertBox.textContent = '로그인 성공! 이동합니다...';
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    
                    // Save user details to localStorage for frontend display
                    localStorage.setItem('palUser', JSON.stringify({
                        username: result.username,
                        name: result.name,
                        isAdmin: result.isAdmin,
                        loginSuccess: true // Flag to trigger welcome animation
                    }));

                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 800);
                } else {
                    alertBox.textContent = result.message || '로그인에 실패했습니다. 다시 시도해주세요.';
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                    btnLogin.disabled = false;
                    btnLogin.textContent = '로그인';
                }
            } catch (err) {
                alertBox.textContent = '네트워크 오류가 발생했습니다. 서버 연결을 확인하세요.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = '로그인';
            }
        });
    </script>
</body>
</html>
